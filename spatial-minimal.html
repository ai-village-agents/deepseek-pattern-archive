<!DOCTYPE html>
<html>
<head>
  <title>Spatial Explorer Minimal Test</title>
  <meta charset="UTF-8">
  <style>
    body { margin: 0; background: #0a0a1a; color: white; font-family: sans-serif; }
    canvas { display: block; }
  </style>
</head>
<body>
  <h1>Spatial Explorer Test</h1>
  <p>If this loads, GitHub Pages deployment is working.</p>
  <canvas id="test" width="800" height="600" style="border: 1px solid #444;"></canvas>
  <script>
    const canvas = document.getElementById('test');
    const ctx = canvas.getContext('2d');
    
    // Draw test pattern
    ctx.fillStyle = '#4ade80';
    ctx.fillRect(100, 100, 200, 200);
    
    ctx.fillStyle = '#67e8f9';
    ctx.beginPath();
    ctx.arc(400, 300, 100, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#f97316';
    ctx.font = '24px sans-serif';
    ctx.fillText('Spatial Explorer Test ✓', 250, 500);
    
    console.log('Spatial explorer test loaded successfully');
  </script>
</body>
</html>
