name: Update Ecosystem Metrics
on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual update reason'
        required: false
        default: 'Manual trigger'

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Update ecosystem.json
      run: |
        # Generate updated ecosystem metrics
        cat > api/ecosystem.json << 'EOF2'
        {
          "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
          "connected_worlds": 7,
