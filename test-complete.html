<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pattern Archive - Complete System Test</title>
    <style>
        body { font-family: monospace; background: #0a0a0a; color: #ddd; padding: 20px; }
        .test { margin: 15px 0; padding: 10px; border-left: 3px solid #444; }
        .pass { border-left-color: #4caf50; }
        .fail { border-left-color: #f44336; }
        button { background: #007acc; color: white; border: none; padding: 8px 16px; margin: 5px; cursor: pointer; }
        #results { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <h1>Pattern Archive - Complete System Test</h1>
    
    <h2>Module Loading Test</h2>
    <button onclick="testModuleLoading()">Test All Modules</button>
    
    <h2>Create Test Data</h2>
    <button onclick="generateTestData()">Generate 50 Test Anomalies</button>
    
    <h2>Run Pattern Discovery</h2>
    <button onclick="testDiscovery()">Test Pattern Discovery</button>
    <button onclick="testUI()">Test UI Integration</button>
    
    <div id="results"></div>
    
    <script src="js/pattern-discovery.js"></script>
    <script src="js/pattern-discovery-ui.js"></script>
    
    <script>
        function log(msg, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test ${type === 'pass' ? 'pass' : type === 'fail' ? 'fail' : ''}`;
            div.innerHTML = `<strong>[${new Date().toLocaleTimeString()}]</strong> ${msg}`;
            results.appendChild(div);
        }
        
        function testModuleLoading() {
            log('Testing module loading...');
            
            const tests = [
                { name: 'PatternDiscovery', check: () => typeof PatternDiscovery !== 'undefined' },
                { name: 'PatternDiscovery.analyzeAnomalies', check: () => typeof PatternDiscovery?.analyzeAnomalies === 'function' },
                { name: 'PatternDiscoveryUI', check: () => typeof PatternDiscoveryUI !== 'undefined' },
                { name: 'PatternDiscoveryUI.init', check: () => typeof PatternDiscoveryUI?.init === 'function' }
            ];
            
            let allPassed = true;
            
            tests.forEach(test => {
                try {
                    const passed = test.check();
                    log(`${passed ? '✅' : '❌'} ${test.name}: ${passed ? 'Loaded' : 'Missing'}`, passed ? 'pass' : 'fail');
                    if (!passed) allPassed = false;
                } catch (err) {
                    log(`❌ ${test.name}: Error - ${err.message}`, 'fail');
                    allPassed = false;
                }
            });
            
            if (allPassed) {
                log('✅ All modules loaded successfully!', 'pass');
            } else {
                log('❌ Some modules failed to load', 'fail');
            }
        }
        
        function generateTestData() {
            try {
                // Clear existing
                localStorage.removeItem('pattern-archive-anomalies');
                
                const anomalies = [];
                const now = new Date();
                
                for (let i = 0; i < 50; i++) {
                    const date = new Date(now);
                    date.setDate(date.getDate() - Math.floor(Math.random() * 90));
                    date.setHours(Math.floor(Math.random() * 24));
                    
                    const patterns = ['incremental', 'exponential', 'clockwork', 'unknown'];
                    const pattern = patterns[Math.floor(Math.random() * patterns.length)];
                    const severity = Math.floor(Math.random() * 5) + 1;
                    
                    anomalies.push({
                        id: `test-gen-${i}`,
                        title: `Generated Anomaly #${i + 1}`,
                        description: `Automatically generated test anomaly for pattern discovery testing. Severity: ${severity}`,
                        type: pattern,
                        severity: severity,
                        timestamp: date.toISOString(),
                        date: date.toISOString(),
                        source: 'test-generator'
                    });
                }
                
                localStorage.setItem('pattern-archive-anomalies', JSON.stringify(anomalies));
                log(`✅ Generated ${anomalies.length} test anomalies`, 'pass');
            } catch (err) {
                log(`❌ Failed to generate test data: ${err.message}`, 'fail');
            }
        }
        
        function testDiscovery() {
            try {
                const anomaliesRaw = localStorage.getItem('pattern-archive-anomalies') || '[]';
                const anomalies = JSON.parse(anomaliesRaw);
                
                if (!anomalies.length) {
                    log('❌ No test data found. Generate test data first.', 'fail');
                    return;
                }
                
                log(`Testing pattern discovery with ${anomalies.length} anomalies...`);
                
                if (typeof PatternDiscovery !== 'undefined' && typeof PatternDiscovery.analyzeAnomalies === 'function') {
                    const result = PatternDiscovery.analyzeAnomalies(anomalies.slice(0, 30)); // Test with first 30
                    
                    log(`✅ Analysis completed: ${result.patterns.length} patterns, ${result.correlations.length} correlations`, 'pass');
                    
                    if (result.patterns.length) {
                        result.patterns.forEach((pattern, idx) => {
                            log(`Pattern ${idx + 1}: ${pattern.patternType} (${Math.round(pattern.confidence * 100)}% confidence)`);
                        });
                    }
                    
                    const metrics = PatternDiscovery.getDiscoveryMetrics();
                    log(`Metrics: ${metrics.patternsDetected} patterns, ${metrics.clustersFound} clusters, ${metrics.anomaliesProcessed} anomalies`);
                    
                } else {
                    log('❌ PatternDiscovery module not available', 'fail');
                }
            } catch (err) {
                log(`❌ Discovery test failed: ${err.message}`, 'fail');
            }
        }
        
        function testUI() {
            try {
                if (typeof PatternDiscoveryUI !== 'undefined' && typeof PatternDiscoveryUI.init === 'function') {
                    log('Initializing Pattern Discovery UI...');
                    PatternDiscoveryUI.init();
                    
                    // Check if UI elements exist
                    const patternsContainer = document.querySelector('.discovery-patterns-container');
                    if (patternsContainer) {
                        log('✅ Pattern Discovery UI initialized successfully', 'pass');
                    } else {
                        log('⚠️ UI initialized but containers not found (might be on different page)', 'info');
                    }
                } else {
                    log('❌ PatternDiscoveryUI module not available', 'fail');
                }
            } catch (err) {
                log(`❌ UI test failed: ${err.message}`, 'fail');
            }
        }
        
        log('Test page loaded. Run tests using buttons above.');
    </script>
</body>
</html>
